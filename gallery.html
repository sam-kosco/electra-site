<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Gallery</title>
  <style>
    /* Intentionally minimal - no design decisions made yet */
    body { color: black; background-color: white; }
    img { max-width: 100%; height: auto; }
  </style>
</head>
<body>

  <nav>
    <a href="index.html">Home</a> |
    <a href="gallery.html">Photo Gallery</a>
  </nav>

  <hr>

  <h1>Photo Gallery</h1>

  <!-- Carousel. Populated by script.js from photos.json. -->
  <div id="carousel" hidden>
    <img id="carousel-img" alt="">
    <p>
      <button id="carousel-prev" type="button">&lt; Previous</button>
      <span id="carousel-counter"></span>
      <button id="carousel-next" type="button">Next &gt;</button>
    </p>
  </div>

  <p id="carousel-empty" hidden>No photos available.</p>

  <script src="script.js"></script>
</body>
</html>
